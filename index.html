<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zullyfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b1017;
      --bg-soft: #121a25;
      --line: #243244;
      --text: #ecf2fa;
      --muted: #9cb1c8;
      --accent: #4fc3ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: "Manrope", sans-serif;
      background: radial-gradient(circle at top right, #14283f 0%, var(--bg) 45%);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      width: min(980px, 92vw);
      margin: 0 auto;
    }

    .hero {
      padding: 5.5rem 0 2.5rem;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.6rem);
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
    }

    .hero p {
      color: var(--muted);
      font-size: clamp(1rem, 1.8vw, 1.15rem);
    }

    .main {
      padding: 0 0 4rem;
    }

    .card {
      background: linear-gradient(165deg, rgba(18, 26, 37, 0.92), rgba(14, 22, 33, 0.98));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 1.1rem;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
    }

    .card-head h2 {
      font-size: clamp(1.1rem, 2.1vw, 1.5rem);
      font-weight: 700;
    }

    .tag {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #06233a;
      background: linear-gradient(100deg, #8fdbff, #4fc3ff);
      border-radius: 999px;
      padding: 0.32rem 0.62rem;
      white-space: nowrap;
    }

    .video {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: #070d14;
      border: 1px solid #1f2e40;
    }

    .video::before {
      content: "";
      display: block;
      padding-bottom: 56.25%;
    }

    .video iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .card-foot {
      margin-top: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .btn {
      text-decoration: none;
      color: #042238;
      background: linear-gradient(100deg, #8fdbff, #4fc3ff);
      border: 0;
      border-radius: 10px;
      font-weight: 800;
      padding: 0.56rem 0.88rem;
      transition: transform 160ms ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    footer {
      border-top: 1px solid var(--line);
      color: #89a1ba;
      padding: 1.1rem 0 2rem;
      font-size: 0.9rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
      gap: 1.4rem;
    }

    @media (max-width: 640px) {
      .hero {
        padding-top: 4rem;
      }
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1>Zullyfolio</h1>
      <p>Portfolio video</p>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div class="grid">

        <section class="card">
          <div class="card-head">
            <h2>Créateur de personnage</h2>
            <span class="tag">Creator</span>
          </div>
          <div class="video">
            <iframe
              src="https://www.youtube.com/embed/gxP0chFEgKY"
              title="Créateur de personnage"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>
          </div>
          <div class="card-foot">
            <a class="btn" href="https://youtu.be/gxP0chFEgKY" target="_blank" rel="noopener noreferrer">Voir sur YouTube</a>
          </div>
        </section>

        <section class="card">
          <div class="card-head">
            <h2>Menu OST</h2>
            <span class="tag">Menu Musique</span>
          </div>
          <div class="video">
            <iframe
              src="https://www.youtube.com/embed/PKwMDglRsX8"
              title="Menu OST"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>
          </div>
          <div class="card-foot">
            <a class="btn" href="https://youtu.be/PKwMDglRsX8" target="_blank" rel="noopener noreferrer">Voir sur YouTube</a>
          </div>
        </section>

        <section class="card">
          <div class="card-head">
            <h2>HUD</h2>
            <span class="tag">HUD</span>
          </div>
          <div class="video">
            <iframe
              src="https://www.youtube.com/embed/PlI2DeU5A8Q"
              title="HUD"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>
          </div>
          <div class="card-foot">
            <a class="btn" href="https://youtu.be/PlI2DeU5A8Q" target="_blank" rel="noopener noreferrer">Voir sur YouTube</a>
          </div>
        </section>

        <section class="card">
          <div class="card-head">
            <h2>Inventaire</h2>
            <span class="tag">Inventaire</span>
          </div>
          <div class="video">
            <iframe
              src="https://www.youtube.com/embed/TscvIHckZhQ"
              title="Inventaire"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>
          </div>
          <div class="card-foot">
            <a class="btn" href="https://youtu.be/TscvIHckZhQ" target="_blank" rel="noopener noreferrer">Voir sur YouTube</a>
          </div>
        </section>

        <section class="card">
          <div class="card-head">
            <h2>SWEP</h2>
            <span class="tag">SWEP</span>
          </div>
          <div class="video">
            <iframe
              src="https://www.youtube.com/embed/00XyB6rfw_Q"
              title="SWEP"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>
          </div>
          <div class="card-foot">
            <a class="btn" href="https://youtu.be/00XyB6rfw_Q" target="_blank" rel="noopener noreferrer">Voir sur YouTube</a>
          </div>
        </section>

      </div>
    </div>
  </main>

  <footer>
    <div class="container">Zullyfolio</div>
  </footer>
</body>
</html>
